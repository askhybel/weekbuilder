<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ugeplanlægger — Adapt & NBRO Running</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F2F0;--white:#FFFFFF;--surface:#F8F8F7;--border:#E4E4E0;--border2:#D0D0CC;
  --text:#1A1A18;--muted:#888884;--faint:#C8C8C4;
  --orange:#D95B22;--orange-bg:#FEF0EA;--orange-bd:#F5C5AA;
  --green:#1A9E68;--green-bg:#EBF8F2;--green-bd:#A8DECA;
  --yellow:#B8860B;--yellow-bg:#FDF6E3;--yellow-bd:#E8D08A;
  --red:#CC3333;--red-bg:#FDF0F0;--red-bd:#F0B8B8;
  --blue:#2E6EBF;--blue-bg:#EBF3FC;--purple:#6B3FA0;--purple-bg:#F0EBF8;
  --mono:'DM Mono',monospace;--sans:'Inter',system-ui,sans-serif;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
.layout{max-width:760px;margin:0 auto;padding:3rem 1.5rem 6rem}
.site-header{margin-bottom:1.5rem}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.site-title{font-size:22px;font-weight:600;letter-spacing:-.02em}
.site-sub{font-size:13px;color:var(--muted);margin-top:3px}
.lang-row{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:3px}
.lang-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--mono);letter-spacing:.06em;transition:all .12s}
.lang-btn:hover{color:var(--text)}
.lang-btn.active{background:var(--white);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.07)}
.attribution{font-size:11px;color:var(--faint);margin-top:6px;font-family:var(--mono)}
.attribution strong{font-weight:500;color:var(--muted)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:.75rem}
.card-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.85rem;display:block}
.dist-tabs{display:flex;gap:6px;flex-wrap:wrap}
.goal-card{padding:.9rem 1.1rem}
.goal-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;gap:1rem}
.goal-date-corner{display:flex;align-items:center;gap:7px;flex-shrink:0}
.goal-date-corner label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap}
.goal-date-corner input[type=date]{font-size:12px;padding:5px 8px;border-radius:7px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--sans);width:auto}
.goal-card .dist-tabs{margin-bottom:.65rem}
.goal-time-row{display:flex;align-items:center;gap:.75rem;margin-top:.6rem;flex-wrap:wrap}

.match-summary-row{display:flex;align-items:center;gap:10px}
.match-summary-mid{flex:1;display:flex;flex-direction:column;gap:5px}
.expand-btn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;font-family:var(--sans);transition:all .12s;line-height:1.4}
.expand-btn:hover{background:var(--border);color:var(--text)}
.goal-rec-divider{height:1px;background:var(--border);margin:.75rem 0}
.goal-rec-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0;gap:12px}
.goal-rec-left{display:flex;align-items:baseline;gap:10px;flex:1;min-width:0}

.grid-total{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.dt{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .12s;font-family:var(--sans)}
.dt:hover{background:var(--surface);color:var(--text)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.sfield{display:flex;flex-direction:column;gap:6px}
.sfield label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.input-toggle-row{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;width:fit-content}
.itog{padding:5px 16px;border-radius:6px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;font-family:var(--sans)}
.itog:hover{color:var(--text)}
.itog.active{background:var(--white);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.pw{display:flex;align-items:center;gap:5px}
.pw input{width:56px;font-size:22px;font-weight:600;text-align:center;padding:7px 3px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono)}
.pw input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-bg)}
.psep{font-size:18px;color:var(--muted);font-family:var(--mono)}
.punit{font-size:12px;color:var(--muted);font-family:var(--mono);margin-left:2px}
input[type=date]{width:100%;font-size:14px;padding:8px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--sans)}
input[type=date]:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-bg)}
.derived-note{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px}
.acc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden}
.atr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.5rem;cursor:pointer;background:transparent;border:none;color:var(--text);gap:12px;transition:background .12s}
.atr:hover{background:var(--surface)}
.atr-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.atr-title{font-size:13px;font-weight:500;white-space:nowrap}
.atr-meta{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ach{color:var(--muted);transition:transform .2s;flex-shrink:0;font-size:12px}
.ach.open{transform:rotate(180deg)}
.ab{padding:0 1.5rem 1.25rem;display:none}
.ab.open{display:block}
.rec-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.rg{background:var(--surface);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.rg-l{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.rg-v{font-size:18px;font-weight:600;font-family:var(--mono)}
.rg-s{font-size:11px;color:var(--muted);margin-top:2px}
.rs-lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.rs-rows{display:flex;flex-direction:column;gap:4px}
.sr-row{display:grid;grid-template-columns:8px 1fr auto auto;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border)}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sn{font-size:13px;font-weight:500}
.sd2{font-size:12px;color:var(--muted)}
.pace-hint{font-family:var(--mono);font-size:11px}
.sf{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}

/* Week grid */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dc{border:1px solid var(--border);border-radius:var(--radius);padding:8px 5px;display:flex;flex-direction:column;gap:4px;background:var(--white);min-height:60px}
.dn{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:center;margin-bottom:2px}
/* Type pills in day card */
.day-type-pill{border-radius:6px;padding:4px 5px 4px 6px;font-size:10px;margin-bottom:3px}
.day-type-pill.run-on{background:var(--orange-bg);border:1px solid var(--orange-bd)}
.day-type-pill.cardio-on{background:var(--blue-bg);border:1px solid #A8C8F0}
.day-type-pill.strength-on{background:var(--purple-bg);border:1px solid #C4A8E0}
.dtp-head{display:flex;align-items:center;justify-content:space-between}
.dtp-label{font-size:10px;font-weight:600;color:var(--text)}
.run-on .dtp-label{color:var(--orange)}
.cardio-on .dtp-label{color:var(--blue)}
.strength-on .dtp-label{color:var(--purple)}
.dtp-remove{background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);padding:0 0 0 4px;line-height:1}
.dtp-remove:hover{color:var(--red)}
.ss{width:100%;font-size:10px;padding:3px 4px;border-radius:5px;background:var(--white);border:1px solid var(--border);color:var(--text);font-family:var(--sans);margin-top:3px}
.dtp-actions{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.dtp-add{font-size:9px;padding:2px 5px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--sans)}
.dtp-add:hover{background:var(--surface);color:var(--text)}
.dtp-rest{font-size:9px;padding:2px 5px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--faint);cursor:pointer;font-family:var(--sans)}
.dtp-rest:hover{color:var(--red)}
.dtb{width:100%;padding:6px 2px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--muted);text-align:center;transition:all .12s;font-family:var(--sans)}
.dtb:hover{background:var(--surface);color:var(--text)}
.dtb.run-on{background:var(--orange-bg);border-color:var(--orange-bd);color:var(--orange);font-weight:600}
.dtb.cardio-on{background:var(--blue-bg);border-color:#A8C8F0;color:var(--blue);font-weight:600}
.dtb.strength-on{background:var(--purple-bg);border-color:#C4A8E0;color:var(--purple);font-weight:600}
.dtb.rest-on{background:var(--surface);border-color:var(--border);color:var(--muted)}
.dc-rest-btn{width:100%;padding:6px 2px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:10px;color:var(--muted);text-align:center;font-family:var(--sans)}
.dc-rest-btn:hover{background:var(--border);color:var(--text)}

/* Match */
.match-summary{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.mini-ring{width:40px;height:40px;border-radius:50%;border:2.5px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mini-pct{font-family:var(--mono);font-size:12px;font-weight:600;line-height:1}
.match-right{flex:1}
.mbadge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:5px;font-family:var(--mono);letter-spacing:.02em}
.mbar-w{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.mbar{height:100%;border-radius:2px;transition:width .5s}
.checks{display:flex;flex-direction:column;gap:5px}
.cr{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid}
.cr.ok{background:var(--green-bg);border-color:var(--green-bd)}
.cr.fail{background:var(--red-bg);border-color:var(--red-bd)}
.ci{font-size:15px;flex-shrink:0}
.cb{flex:1}
.cm{font-size:12px;color:var(--text)}
.cm b{font-weight:600}
.ch{font-size:11px;color:var(--muted);margin-top:2px}
.cw{font-family:var(--mono);font-size:11px;color:var(--faint);white-space:nowrap}
.div{height:1px;background:var(--border);margin:1.5rem 0}

/* Plan section */
.plan-section{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.ph-btns{display:flex;gap:8px;flex-wrap:wrap}
.ph-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.ph{font-size:16px;font-weight:600;letter-spacing:-.01em}
.ph-sub{font-size:12px;color:var(--muted);margin-top:2px}
.pb{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--white);cursor:pointer;font-size:12px;font-weight:500;color:var(--text);transition:all .12s;font-family:var(--sans)}
.pb:hover{background:var(--surface);border-color:var(--orange);color:var(--orange)}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:1rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.stl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.stv{font-size:16px;font-weight:700;font-family:var(--mono)}
.sts{font-size:10px;color:var(--muted);margin-top:2px}
.plan-rows{display:flex;flex-direction:column;gap:6px}
.pc{border-radius:8px;border:1px solid var(--border);background:var(--white);overflow:hidden}
.pc-today{box-shadow:0 0 0 1.5px var(--orange);}
.pc.run{border-left:3px solid var(--orange)}
.pc.alt{border-left:3px solid var(--blue)}
.pc.str{border-left:3px solid var(--purple)}
.pc.rest{background:var(--surface);border-color:var(--border);opacity:.65}
.pch{display:grid;grid-template-columns:88px 1fr auto;align-items:start;gap:14px;padding:11px 14px}
.pcd{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding-top:2px}
.pct{font-size:13px;font-weight:600;color:var(--text)}
.pcs{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45}
.pcr{text-align:right;min-width:80px}
.pcp{font-family:var(--mono);font-size:13px;font-weight:600}
.pace-lbl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:1px}
.pck{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.steps{margin:0;border-top:1px solid var(--border)}
.step{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:6px 14px;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.sl{font-size:12px;color:var(--muted)}
.sr2{font-size:10px;color:var(--faint);font-family:var(--mono)}
.step.key .sl{color:var(--text);font-weight:500}
.pp{display:inline-block;padding:2px 9px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:500;border:1px solid}
.warn{font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:6px;border:1px solid}
.warn.w-yellow{color:var(--yellow);background:var(--yellow-bg);border-color:var(--yellow-bd)}
.warn.w-blue{color:var(--blue);background:var(--blue-bg);border-color:#A8C8F0}
.pck-edit{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:3px}
.pck-input{width:40px;font-size:12px;font-weight:600;text-align:center;padding:2px 3px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--mono);cursor:text}
.pck-input:hover{border-color:var(--orange);background:var(--white)}
.pck-input:focus{outline:none;border-color:var(--orange);background:var(--orange-bg);color:var(--text)}
.pck-input.overridden{color:var(--orange);border-color:var(--orange-bd);background:var(--orange-bg)}
.pck-unit{font-size:10px;color:var(--muted);font-family:var(--mono)}
.pck-reset{font-size:10px;color:var(--faint);background:none;border:none;cursor:pointer;padding:0;margin-left:1px;display:none}
.pck-input.overridden ~ .pck-reset{display:inline}
.pck-reset:hover{color:var(--orange)}
.update-btn{margin-top:.5rem;padding:7px 18px;border-radius:8px;border:none;background:var(--orange);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .12s}
.update-btn:hover{background:#c04e1a}
.fn{font-size:12px;color:var(--muted);padding:12px 0 0;margin-top:8px;font-family:var(--mono);text-align:right;display:flex;flex-direction:row;align-items:baseline;justify-content:flex-end;gap:8px}
.fn strong{color:var(--text);font-weight:700;font-size:24px;letter-spacing:-.02em;line-height:1}
.fn-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.week-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem;flex-wrap:wrap;gap:6px}
.week-match-row{display:flex;align-items:center;gap:8px}
.grid-total{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.match-expand-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px 4px;transition:color .12s}
.match-expand-btn:hover{color:var(--text)}
.mini-ring{width:32px;height:32px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mini-pct{font-family:var(--mono);font-size:11px;font-weight:600;line-height:1}
.mbadge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;font-family:var(--mono);letter-spacing:.02em}
.week-mini{padding:.9rem 1.1rem}
.wm-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.6rem;gap:.5rem}
.wm-footer{display:flex;align-items:baseline;justify-content:space-between;margin-top:.5rem;gap:.5rem}
.wm-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);flex-shrink:0}
.wm-val{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text);text-align:right}
.wm-weeks-row{display:flex;gap:2px;flex-wrap:nowrap;align-items:flex-end;height:40px}
.wm-bar-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;min-width:2px;cursor:pointer}
.wm-bar-col:hover .wm-bar-seg{filter:brightness(1.15)}
.wm-bar-seg{border-radius:2px 2px 0 0;width:100%;transition:height .3s}
.wm-current{outline:2px solid var(--orange);outline-offset:1px}
.wm-tip{position:absolute;top:calc(100% + 6px);background:var(--text);color:var(--white);font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:5px;white-space:nowrap;z-index:10;pointer-events:none}
@media(max-width:640px){
  .two-col{grid-template-columns:1fr}
  .layout{padding:1rem .75rem 4rem}
  .week-grid{gap:3px}
  .dc{padding:7px 3px;min-height:50px}
  .dn{font-size:9px}
  .dtb{font-size:10px;padding:5px 1px}
  .ss{font-size:9px;padding:2px 3px}
  .day-km-label{font-size:9px}
  .pch{grid-template-columns:72px 1fr auto;gap:8px;padding:10px 10px}
  .pcp{font-size:12px}
  .pck{font-size:10px}
  .pct{font-size:13px}
  .pcs{font-size:11px}
  .steps{margin:0 10px 10px}
  .step{gap:6px;padding:5px 0}
  .sl{font-size:11px}
  .pp{font-size:10px;padding:2px 6px}
  .plan-section{padding:1rem}
  .ph-row{flex-wrap:wrap;gap:8px}
  .ph{font-size:14px}
  .fn strong{font-size:22px}
  .atr{padding:.75rem 1rem}
  .card{padding:1rem}
  .rec-g{grid-template-columns:repeat(2,1fr)}
  .sr-row{grid-template-columns:8px 1fr auto;gap:6px}
  .sf{display:none}
  .pw input{width:52px;font-size:22px}
}
@media print{
  .print-attribution{display:block!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .np{display:none!important}
  html{background:#fff}
  .layout{padding:20px 24px}
  .plan-section{box-shadow:none;border:1px solid #ddd}
  .pc{page-break-inside:avoid}
  @page{margin:1.5cm;size:A4}
}
</style>
</head>
<body>
<div class="layout">

<header class="site-header np">
  <div class="header-top">
    <div>
      <div class="site-title" id="siteTitle">Ugeplanlægger</div>

    </div>
    <div class="lang-row">
      <button class="lang-btn active" id="btnDa" onclick="setLang('da')">DA</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>

function kStr(kmVal){return lang==='en'?(Math.round(kmVal*0.621371*10)/10)+' mi':kmVal+' km'}

function wOut(){const v=document.getElementById('raceDate').value;if(!v)return 15;return Math.max(0,Math.round((new Date(v)-new Date())/(1000*60*60*24*7)))}
function taperWeeks(){return{'5k':1,'10k':1,'hm':2,'m':3}[curDist]}
function calcPhase(w){const tw=taperWeeks();if(w<=0)return'race';if(w<=tw)return'taper';if(w<=tw+4)return'build';return'base'}
function calcWeekKm(pkKm,w){
  const tw=taperWeeks();
  if(w<=0)return Math.round(pkKm*0.25);
  if(w<=tw){const f={'5k':[0.4],'10k':[0.4],'hm':[0.6,0.35],'m':[0.65,0.45,0.25]}[curDist];return Math.round(pkKm*(f[tw-w]||0.3))}
  const total={'5k':8,'10k':10,'hm':14,'m':18}[curDist];
  const wip=Math.max(1,total-(w-tw)+1);
  const prog=Math.min(wip/total,1.0);
  const cb=(wip%4===0);
  let vol=pkKm*(0.50+prog*0.50);
  if(cb)vol*=0.75;
  return Math.round(Math.max(vol,pkKm*0.40));
}

function distDefaults(dist){
  // Optimal week — always starts at the best structure for each distance,
  // then adds days strategically (quality before easy) until volume target hit.
  // Mon=0 Tue=1 Wed=2 Thu=3 Fri=4 Sat=5 Sun=6

  const weeks=wOut();
  const phase=calcPhase(weeks);
  const ref=gRef();
  const req=REQS[dist](ref.raw);
  const wKm=calcWeekKm(req.pk,weeks);
  const hmRef=ref.hmRef;
  const wn=getWN(new Date());

  function plannedTotal(types,sessions){
    const ri=types.map((t,i)=>t==='run'?i:-1).filter(i=>i>=0);
    return ri.reduce((sum,i)=>sum+bSess(sessions[i]||'easy',hmRef,wKm,phase,weeks,ri.length,wn,i).km,0);
  }

  // ── Base 4-day structure ────────────────────────────────────────
  if(dist==='5k'){
    dayTypes=['run','rest','run','run','rest','run','rest'];
    daySessions={0:'tempo',2:'int',3:'easy',5:'long'};
  } else if(dist==='10k'){
    dayTypes=['run','rest','run','run','rest','run','rest'];
    daySessions={0:'tempo',2:'int',3:'easy',5:'long'};
  } else if(dist==='hm'){
    // Base 5 days: Mon=tempo, Tue=easy, Wed=int, Thu=easy, Fri=REST, Sat=long
    dayTypes=['run','run','run','run','rest','run','rest'];
    daySessions={0:'tempo',1:'easy',2:'int',3:'easy',5:'long'};
  } else { // marathon — Tue=tempo, Thu=int, separated by Wed rest
    dayTypes=['run','run','rest','run','rest','run','rest'];
    daySessions={0:'easy',1:'tempo',3:'int',5:'long'};
  }

  // ── Add days to hit volume — quality first, then easy ──────────
  // Priority order: quality slots → easy slots, max 6 days
  // Slots by distance/priority:
  const addSlots={
    '5k':  [{d:1,s:'easy'}],                              // Tue easy (Fri stays free)
    '10k': [{d:1,s:'easy'},{d:6,s:'easy'}],               // Tue easy, Sun easy (Fri stays free)
    'hm':  [{d:6,s:'easy'},{d:4,s:'easy'}], // Sun easy (6th), then Fri (last resort)
    'm':   [{d:2,s:'easy'},{d:6,s:'easy'},{d:4,s:'easy'}], // Wed easy, Sun easy, Fri last resort
  };

  const slots=addSlots[dist]||[];
  for(let i=0;i<slots.length;i++){
    const runCount=dayTypes.filter(t=>t==='run').length;
    if(runCount>=6) break;
    const minDays=dist==='m'?5:4;
    const belowMin=runCount<minDays;
    // HM base is 5 days — accept slightly lower threshold so we don't auto-add a 6th
    const volThreshold=dist==='hm'?0.85:0.90;
    const belowVol=plannedTotal(dayTypes,daySessions)<wKm*volThreshold;
    if(!belowMin&&!belowVol) break;
    const {d,s}=slots[i];
    if(dayTypes[d]==='rest'){
      dayTypes[d]='run';
      daySessions[d]=s;
    }
  }
}

  // Phase-aware: in taper, recommend shorter/easier variants first

function calcPkKm(){return REQS[curDist](gRef().raw).pk;}

function setVariant(dayIdx, variantIdx){
  dayVariantOverride[dayIdx]=parseInt(variantIdx);
  render();
  // rGrid re-renders the variant picker with the new selection highlighted
  rGrid();
}
function setDayKm(dayIdx, newVal, defaultKm){
  const n=parseFloat(newVal);
  if(isNaN(n)||n<=0){delete dayKmOverride[dayIdx];render();return;}
  const kmVal=lang==='en'?Math.round(n/0.621371*10)/10:n;
  if(Math.abs(kmVal-defaultKm)<0.05){
    delete dayKmOverride[dayIdx];
  } else {
    dayKmOverride[dayIdx]=kmVal;
    manualKmMode=true; // switch to manual — other days won't auto-adjust
  }
  render();
}
function resetDayKm(dayIdx){
  delete dayKmOverride[dayIdx];
  if(Object.keys(dayKmOverride).length===0) manualKmMode=false;
  render();
}
function resetAllKm(){
  dayKmOverride={};
  manualKmMode=false;
  render();
}
function cycleT(i){
  const o=['rest','run','cardio','strength'];
  dayTypes[i]=o[(o.indexOf(dayTypes[i])+1)%4];
  if(dayTypes[i]==='run'&&!daySessions[i]) daySessions[i]=autoSess(i);
  if(dayTypes[i]!=='run'){ delete daySessions[i]; delete dayKmOverride[i]; delete dayVariantOverride[i]; }
  rGrid();render();
}
function autoSess(i){
  const run=dayTypes.map((tp,j)=>tp==='run'?j:-1).filter(j=>j>=0).sort((a,b)=>a-b);
  const p=run.indexOf(i),n=run.length;
  if(p===n-1)return'long';if(n<=2)return p===0?'tempo':'long';return p===0?'tempo':'easy';
}

function rGrid(){
  const t=tr();
  const TYPE_CLS={rest:'rest-on',run:'run-on',cardio:'cardio-on',strength:'strength-on'};
  // We need wKm and phase to show default km — get from current state
  const _ref=gRef(),_w=wOut(),_ph=calcPhase(_w),_req=REQS[curDist](_ref.raw),_pk=_req.pk,_wKm=calcWeekKm(_pk,_w);
  const _runCount=dayTypes.filter(tp=>tp==='run').length;
  const todayIdx=(new Date().getDay()+6)%7; // Mon=0, Tue=1, ..., Sun=6
  document.getElementById('weekGrid').innerHTML=t.dayNames.map((d,i)=>{
    const tp=dayTypes[i];
    const cls=TYPE_CLS[tp]||'rest-on';
    const isToday=i===todayIdx;
    let inner='';
    if(tp==='run'){
      const cur=daySessions[i]||'easy';
      const defKm=bSess(cur,_ref.hmRef,_wKm,_ph,_w,_runCount,getWN(new Date()),i).km;
      const defDisp=kmToUnit(defKm);
      const overrideDisp=dayKmOverride[i]!=null?kmToUnit(dayKmOverride[i]):null;
      const dispVal=overrideDisp!=null?overrideDisp:defDisp;
      const isOverridden=overrideDisp!=null;
      // Variant picker for sessions that have multiple options
      const hasVariants=['int','tempo','vo2','race','long'].includes(cur);
      let varPicker='';
      if(hasVariants){
        const pool=getVariantPool(cur,i);
        if(pool&&pool.length>1){
          const baseRot=(getWN(new Date())||0)%pool.length;
          const curVar=dayVariantOverride[i]!=null?dayVariantOverride[i]:baseRot;
          varPicker=`<select class="ss var-select" style="margin-top:2px;font-size:9px;color:var(--muted)" onchange="setVariant(${i},this.value)">${pool.map((v,vi)=>`<option value="${vi}"${vi===curVar?' selected':''}>${v.title.slice(0,28)}</option>`).join('')}</select>`;
        }
      }
      inner=`<select class="ss" onchange="daySessions[${i}]=this.value;delete dayKmOverride[${i}];delete dayVariantOverride[${i}];render();rGrid()">${t.sessTypes.map(s=>`<option value="${s.id}"${cur===s.id?' selected':''}>${s.label}</option>`).join('')}</select>
        ${varPicker}
        <div class="day-km-wrap">
          <input class="pck-input${isOverridden?' overridden':''}" type="number" min="1" max="99" step="0.5"
            value="${dispVal}"
            title="${lang==='da'?'Anbefalet: '+defDisp+' '+distUnit():'Recommended: '+defDisp+' '+distUnit()}"
            onchange="setDayKm(${i},this.value,${defKm})"
            onfocus="this.select()">
          <span class="pck-unit">${distUnit()}</span>
          ${isOverridden?`<button class="pck-reset" onclick="event.stopPropagation();resetDayKm(${i})" title="${lang==='da'?'Nulstil':'Reset'}">↺</button>`:''}
        </div>`;
    }
    return`<div class="dc${isToday?' dc-today':''}" style="${isToday?'border-color:var(--orange);border-width:1.5px;':''}"><div class="dn">${d}${isToday?'<span class="today-dot"></span>':''}</div><button class="dtb ${cls}" onclick="cycleT(${i})">${t.typeLabels[tp]||tp}</button>${inner}</div>`;
  }).join('');
}

  // vo2, race, long — get variant from pool if override set

// ── MATCH ─────────────────────────────────────────────────────────────────
function calcMatch(raw,hmRef,wKm,phase,weeks){
  const t=tr();
  const dc=t.distChecks[curDist]||t.distChecks['hm'];
  const cl=t.checkLabels,cp=t.checkPass,cf=t.checkFail,ch=t.checkHints;
  const runDayIdxs=dayTypes.map((t,i)=>t==='run'?i:-1).filter(i=>i>=0);
  const allSessIds=runDayIdxs.map(i=>daySessions[i]||'easy');
  const hard=['int','vo2','tempo','race'];
  const hasLong=allSessIds.some(s=>s==='long');
  const tot=runDayIdxs.length;
  const easyCount=allSessIds.filter(s=>s==='easy'||s==='rest_run').length;
  const hasEasy=easyCount>0;
  const isTaper=phase==='taper'||phase==='race';

  // Volume check
  const plannedKm=runDayIdxs.reduce((sum,i)=>{
    const base=bSess(daySessions[i]||'easy',hmRef,wKm,phase,weeks,runDayIdxs.length,getWN(new Date()),i).km;
    return sum+(dayKmOverride[i]!=null?dayKmOverride[i]:base);
  },0);
  const volLow=Math.round(wKm*0.90),volHigh=Math.round(wKm*1.10);
  const volOk=plannedKm>=volLow&&plannedKm<=volHigh;

  // Consecutive hard check (3 in a row = problem for all, 2 in a row only for 5k/10k)
  const sortedRun=[...runDayIdxs].sort((a,b)=>a-b);
  const maxConsec=(['5k','10k'].includes(curDist)?2:3);
  let consecCount=0, maxConsecFound=0;
  sortedRun.forEach((di,idx,arr)=>{
    if(idx>0&&arr[idx-1]===di-1&&hard.includes(daySessions[arr[idx-1]]||'easy')&&hard.includes(daySessions[di]||'easy')){
      consecCount++;
      maxConsecFound=Math.max(maxConsecFound,consecCount+1);
    } else consecCount=0;
  });
  const noC=maxConsecFound<maxConsec;

  // Dist-specific checks
  let q1ok=false,q2ok=false;
  if(curDist==='5k'){
    q1ok=allSessIds.some(s=>s==='int'||s==='vo2');
    q2ok=allSessIds.some(s=>s==='tempo');
  } else if(curDist==='10k'){
    q1ok=allSessIds.some(s=>s==='int');
    q2ok=allSessIds.some(s=>s==='tempo');
  } else if(curDist==='hm'){
    q1ok=allSessIds.some(s=>hard.includes(s));
    q2ok=allSessIds.some(s=>s==='int'||s==='race');
  } else { // marathon
    q1ok=allSessIds.some(s=>s==='int'||s==='race'); // M-pace work
    q2ok=easyCount>=2; // needs multiple easy runs
  }

  const da=lang==='da';
  const volPassStr=`~${kmToUnit(plannedKm)} ${distUnit()} (${da?'mål':'target'}: ${kmToUnit(wKm)} ${distUnit()})`;
  const volFailStr=plannedKm<volLow
    ?(da?`Kun ~${kmToUnit(plannedKm)} ${distUnit()} (mål: ${kmToUnit(wKm)} ${distUnit()})→ Tilføj en løbedag eller forlæng et pas`:`Only ~${kmToUnit(plannedKm)} ${distUnit()} (target: ${kmToUnit(wKm)} ${distUnit()}) → Add a run day or extend a session`)
    :(da?`~${kmToUnit(plannedKm)} ${distUnit()} er over målet (${kmToUnit(wKm)} ${distUnit()})`:`~${kmToUnit(plannedKm)} ${distUnit()} exceeds target (${kmToUnit(wKm)} ${distUnit()})`);

  const checks=[
    {ok:hasLong,  lbl:cl.long,   pass:cp.long,  fail:cf.long,  hint:ch.long, w:20},
    {ok:q1ok,     lbl:dc.q,      pass:dc.qPass, fail:dc.qFail, hint:dc.qFail,w:20},
    {ok:q2ok,     lbl:dc.q2,     pass:dc.q2Pass,fail:dc.q2Fail,hint:dc.q2Fail,w:15},
    {ok:hasEasy,  lbl:cl.easy,   pass:cp.easy,  fail:cf.easy,  hint:ch.easy, w:15},
    {ok:noC,      lbl:cl.spread, pass:cp.spread,fail:cf.spread,hint:ch.spread,w:10},
    {ok:volOk,    lbl:cl.vol,    pass:volPassStr,fail:volFailStr,hint:'',     w:20},
  ];
  return{score:checks.reduce((s,c)=>s+(c.ok?c.w:0),0),checks};
}

  // Run/alt day counts

  // Match
  const{score,checks}=calcMatch(raw,hmRef,wKm,phase,weeks);
  let barC,bTxt,bBg,bTc,bBd;
  if(score>=90){barC='#1A9E68';bTxt=t.matchGood;bBg='#EBF8F2';bTc='#1A9E68';bBd='#A8DECA'}
  else if(score>=65){barC='#B8860B';bTxt=t.matchClose;bBg='#FDF6E3';bTc='#B8860B';bBd='#E8D08A'}

    if(idx>0&&arr[idx-1]===di-1&&hard.includes(daySessions[arr[idx-1]]||'easy')&&hard.includes(daySessions[di]||'easy')){
      cRun++;
      if(cRun>=maxConsecWarn) warns.push({cls:'w-yellow',icon:'⚠️',msg:t.consecWarn(t.dayNamesFull[arr[idx-1]],t.dayNamesFull[di])});
    } else cRun=0;
  });
  document.getElementById('warnBox').innerHTML=warns.map(w=>`<div class="warn ${w.cls}">${w.icon} ${w.msg}</div>`).join('');
  // Plan rows
  let totalKm=0;
  const todayPlanIdx=(new Date().getDay()+6)%7;
  document.getElementById('planRows').innerHTML=t.dayNamesFull.map((dayName,i)=>{
    const isToday=i===todayPlanIdx;
    const tp=dayTypes[i];
    if(tp==='rest')return`<div class="pc rest${isToday?' pc-today':''}"><div class="pch"><span class="pcd">${isToday?'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--orange);margin-right:5px;vertical-align:1px"></span>':''}${dayName}</span><span style="font-size:12px;color:#AAAAAA">${t.restNote}</span></div></div>`;
    if(tp==='cardio')return`<div class="pc alt${isToday?' pc-today':''}"><div class="pch"><span class="pcd">${isToday?'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--orange);margin-right:5px;vertical-align:1px"></span>':''}${dayName}</span><span style="font-size:12px;color:#2E6EBF;font-style:italic">${t.cardioNote}</span></div></div>`;
    if(tp==='strength')return`<div class="pc str${isToday?' pc-today':''}"><div class="pch"><span class="pcd">${isToday?'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--orange);margin-right:5px;vertical-align:1px"></span>':''}${dayName}</span><span style="font-size:12px;color:#6B3FA0;font-style:italic">${t.strengthNote}</span></div></div>`;
    const sess=bSess(daySessions[i]||'easy',hmRef,wKm,phase,weeks,runIdxs.length,getWN(new Date()),i);
    const defaultKm=sess.km;
    const overrideKm=dayKmOverride[i]!=null?dayKmOverride[i]:null;
    const actualKm=overrideKm!=null?overrideKm:defaultKm;
    const displayKmUnit=kmToUnit(actualKm);
    const defaultDisp=kmToUnit(defaultKm);
    const isOverridden=overrideKm!=null;
    totalKm+=actualKm;
    const stH=sess.st.length>1?`<div class="steps">${sess.st.map(s=>`<div class="step${s.k?' key':''}"><div style="display:flex;align-items:center;gap:6px"><span class="sl">${s.l}</span>${s.r?`<span class="sr2">· ${s.r}</span>`:''}</div>${pill(s.rng.lo,s.rng.hi,color,s.k)}</div>`).join('')}</div>`:'';
    return`<div class="pc run${isToday?' pc-today':''}"><div class="pch"><span class="pcd">${isToday?'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--orange);margin-right:5px;vertical-align:1px"></span>':''}${dayName}</span><div><div class="pct">${sess.t}</div><div class="pcs">${sess.s}</div></div><div class="pcr"><div class="pcp" style="color:${color}"><span class="pace-lbl">${['easy','long'].includes(daySessions[i]||'easy')?'Zone 2':lang==='da'?'Pace fokus':'Pace focus'}</span>${dp(sess.dr.lo)}–${dp(sess.dr.hi)}</div><div class="pck">${isOverridden?'':'\~'}${displayKmUnit} ${distUnit()}${isOverridden?' <span style=\"color:var(--orange);font-size:9px\">✎</span>':''}</div></div></div>${stH?`<div style="background:var(--surface);border-top:1px solid var(--border)">${stH}</div>`:''}</div>`;
  }).join('');
    document.getElementById('fn').innerHTML=`<span class="fn-label">${t.totalLabel}</span><strong>~${kmToUnit(totalKm)} ${distUnit()}</strong>`;
  const gridTotalEl=document.getElementById('gridTotal');
  if(gridTotalEl) gridTotalEl.textContent='~'+kmToUnit(totalKm)+' '+distUnit();

  renderMini(weeks,pkKm,wKm,totalKm,phase,color,t);
}

function renderMini(weeks,pkKm,wKm,totalKm,phase,color,t){
  const el=document.getElementById('weekMini');
  if(!el) return;

  const tw=taperWeeks();
  const totalBuild={'5k':8,'10k':10,'hm':14,'m':18}[curDist];
  const totalPlan=totalBuild+tw;
  const phLbl=t.phases[phase]||phase;
  const progressLabel=weeks<=0?(lang==='da'?'Race-uge 🏁':'Race week 🏁'):lang==='da'?`${weeks} uger til race`:`${weeks} weeks to race`;

  // Early start: weeks to race exceeds typical plan length
  const tooEarly=weeks>totalPlan;
  const earlyMsg=lang==='da'
    ?`Du starter ${weeks-totalPlan} uge${weeks-totalPlan!==1?'r':''} før en typisk opbygning. Planen viser de ${totalPlan} uger op til race.`
    :`You're starting ${weeks-totalPlan} week${weeks-totalPlan!==1?'s':''} before a typical build-up. The chart shows the ${totalPlan} weeks to race.`;

  // Week bars
  const maxBarH=36;
  const showWeeks=Math.min(totalPlan,24);
  const startOffset=Math.max(0,totalPlan-showWeeks);
  let bars='';
  for(let i=0;i<showWeeks;i++){
    const wkNum=startOffset+i;
    const weeksToRace=totalPlan-wkNum;
    const isCurrent=weeksToRace===weeks;
    const isTaperW=weeksToRace<=tw;
    const isPast=weeksToRace>weeks;
    const wkKm=calcWeekKm(pkKm,weeksToRace);
    const wkPhase=calcPhase(weeksToRace);
    const wkPhaseLbl=t.phases[wkPhase]||wkPhase;
    const barH=Math.max(4,Math.round((wkKm/pkKm)*maxBarH));
    const bg=isPast?'var(--border2)':isTaperW?color+'55':color+(isCurrent?'':'88');
    const op=isPast?0.45:1;
    const kmDisp=kmToUnit(wkKm)+' '+distUnit();
    const weekNum=totalPlan-showWeeks+i+1;
    const tooltipDA=`Uge ${weekNum} · ${kmDisp} · ${wkPhaseLbl}`;
    const tooltipEN=`Week ${weekNum} · ${kmDisp} · ${wkPhaseLbl}`;
    const tooltip=lang==='da'?tooltipDA:tooltipEN;
    bars+=`<div class="wm-bar-col" 
      onmouseenter="showWeekTip(this,'${tooltip.replace(/'/g,'&#39;')}')" 
      onmouseleave="hideWeekTip()"
      onclick="showWeekTip(this,'${tooltip.replace(/'/g,'&#39;')}',true)">
      <div class="wm-bar-seg${isCurrent?' wm-current':''}" style="height:${barH}px;background:${bg};opacity:${op}"></div>
    </div>`;
  }

  // Volume line
  const volPct=pkKm>0?Math.round((wKm/pkKm)*100):0;
  const volLabel=lang==='da'?`Anbefalet ${kmToUnit(wKm)} ${distUnit()} — ${volPct}% af peak`:
    `Recommended ${kmToUnit(wKm)} ${distUnit()} — ${volPct}% of peak`;

  el.innerHTML=`
    <div class="wm-header">
      <span class="wm-label">${lang==='da'?'Ugeoverblik':'Week overview'}</span>
      <span class="wm-val">${progressLabel} · <span style="color:${color}">${phLbl}</span></span>
    </div>
    ${tooEarly?`<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:.5rem;padding:5px 8px;background:var(--surface);border-radius:6px;border:1px solid var(--border)">${earlyMsg}</div>`:''}
    <div style="position:relative;margin-top:.5rem">
      <div class="wm-weeks-row">${bars}</div>
      <div class="wm-tip" id="wmTip" style="display:none"></div>
    </div>
    <div class="wm-footer">
      <span class="wm-label">${lang==='da'?'Denne uge':'This week'}</span>
      <span class="wm-val">${volLabel}</span>
    </div>
  `;
}

function showWeekTip(el,txt,sticky){
  const tip=document.getElementById('wmTip');
  if(!tip) return;
  tip.textContent=txt;
  tip.style.display='block';
  // Position below the bar column
  const wrap=el.closest('.wm-weeks-row');
  const wrapRect=wrap?wrap.getBoundingClientRect():{left:0,width:0};
  const elRect=el.getBoundingClientRect();
  const relLeft=elRect.left-wrapRect.left;
  const pct=relLeft/wrapRect.width*100;
  tip.style.left=Math.min(Math.max(0,pct-10),60)+'%';
  if(sticky) setTimeout(()=>tip.style.display='none',2000);
}
function hideWeekTip(){
  const tip=document.getElementById('wmTip');
  if(tip) tip.style.display='none';
}


// ── INIT ──────────────────────────────────────────────────────────────────

function downloadICS(){
  const now=new Date();
  // Find the Monday of the current week
  const dayOfWeek=now.getDay(); // 0=Sun,1=Mon,...6=Sat
  const monday=new Date(now);
  monday.setDate(now.getDate() - ((dayOfWeek+6)%7)); // go to Monday
  monday.setHours(7,0,0,0); // default 07:00

  const {raw,hmRef}=gRef();
  const weeks=wOut();
  const phase=calcPhase(weeks);
  const req=REQS[curDist](raw);
  const pkKm=req.pk;
  const wKm=calcWeekKm(pkKm,weeks);
  const runIdxs=dayTypes.map((t,i)=>t==='run'?i:-1).filter(i=>i>=0);
  const wn=getWN(now);
  const t=tr();

  function fmt(d){
    // Format as YYYYMMDDTHHMMSS
    const pad=n=>String(n).padStart(2,'0');
    return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
  }
  function fmtDate(d){
    const pad=n=>String(n).padStart(2,'0');
    return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  }

  function icsEscape(str){
    return (str||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  }

  function wrapLine(line){
    // ICS requires lines ≤75 octets, fold longer lines
    const out=[];
    while(line.length>75){out.push(line.slice(0,75));line=' '+line.slice(75);}
    out.push(line);
    return out.join('\r\n');
  }

  const events=[];
  const stamp=fmt(now)+'Z';

  dayTypes.forEach((tp,i)=>{
    const day=new Date(monday);
    day.setDate(monday.getDate()+i);

    if(tp==='rest') return; // skip rest days

    if(tp==='cardio'||tp==='strength'){
      const title=t.typeLabels[tp];
      const desc=tp==='cardio'?t.cardioNote:t.strengthNote;
      const dtstart=fmtDate(day);
      const dtend=fmtDate(day);
      const uid='ugeplanner-'+fmtDate(day)+'-'+tp+'@adapt.dk';
      events.push(
        'BEGIN:VEVENT\r\n'+
        wrapLine('UID:'+uid)+'\r\n'+
        'DTSTAMP:'+stamp+'\r\n'+
        'DTSTART;VALUE=DATE:'+dtstart+'\r\n'+
        'DTEND;VALUE=DATE:'+dtend+'\r\n'+
        wrapLine('SUMMARY:'+icsEscape(title))+'\r\n'+
        wrapLine('DESCRIPTION:'+icsEscape(desc))+'\r\n'+
        'END:VEVENT'
      );
      return;
    }

    if(tp==='run'){
      const sess=bSess(daySessions[i]||'easy',hmRef,wKm,phase,weeks,runIdxs.length,wn);
      const overrideKm=dayKmOverride[i]!=null?dayKmOverride[i]:null;
      const km=overrideKm!=null?overrideKm:sess.km;
      const kmDisp=kmToUnit(km)+' '+distUnit();

      // Title: session name + distance
      const title=sess.t+' – '+kmDisp;

      // Description: subtitle + steps
      let desc=sess.s+'\n\n';
      desc+=(lang==='da'?'Pace: ':'Pace: ')+dp(sess.dr.lo)+'–'+dp(sess.dr.hi)+' min/'+(lang==='en'?'mi':'km')+'\n';
      if(sess.st.length>1){
        desc+='\n'+(lang==='da'?'Opbygning:':'Structure:')+'\n';
        sess.st.forEach(step=>{
          const stepPace=dp(step.rng.lo)+'–'+dp(step.rng.hi);
          const dist2=step.r?step.r+' ':'';
          desc+=step.l+(dist2?': '+dist2:'')+'('+stepPace+' min/'+(lang==='en'?'mi':'km')+')\n';
        });
      }
      desc+='\n'+(lang==='da'?'Lavet af Ask Hybel · Adapt / NBRO Running':'By Ask Hybel · Adapt / NBRO Running');

      // Set time: run sessions get a time slot (07:00 → estimated end)
      const durationMin=Math.round(km*(lang==='en'?1.609:1)*sess.dr.lo/60)+15; // approx
      const startH=7;
      const start=new Date(day); start.setHours(startH,0,0,0);
      const end=new Date(start); end.setMinutes(start.getMinutes()+durationMin);

      const uid='ugeplanner-'+fmt(start)+'-run@adapt.dk';
      events.push(
        'BEGIN:VEVENT\r\n'+
        wrapLine('UID:'+uid)+'\r\n'+
        'DTSTAMP:'+stamp+'\r\n'+
        'DTSTART:'+fmt(start)+'\r\n'+
        'DTEND:'+fmt(end)+'\r\n'+
        wrapLine('SUMMARY:'+icsEscape(title))+'\r\n'+
        wrapLine('DESCRIPTION:'+icsEscape(desc))+'\r\n'+
        'END:VEVENT'
      );
    }
  });

  const ics=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Adapt & NBRO Running//Ugeplanlægger//'+lang.toUpperCase(),
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:'+(lang==='da'?'Træningsuge '+wn:'Training week '+wn),
    ...events,
    'END:VCALENDAR'
  ].join('\r\n');

  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=(lang==='da'?'traeningsuge-':'training-week-')+wn+'.ics';
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('raceDate').addEventListener('input',render);

// Compute optimal week for default dist before first render
distDefaults(curDist);
rGrid();render();onTimeChange();
</script>
