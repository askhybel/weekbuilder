
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
body{font-family:var(--font-sans)}
.page{background:var(--color-background-tertiary);padding:2.5rem 1rem 4rem;min-height:100vh}
.container{max-width:680px;margin:0 auto}

.page-header{margin-bottom:2rem}
.page-title{font-size:22px;font-weight:500;color:var(--color-text-primary);letter-spacing:-.01em}
.page-sub{font-size:13px;color:var(--color-text-secondary);margin-top:3px}

.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem;margin-bottom:.75rem}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-secondary);margin-bottom:.75rem;display:block}

.dist-tabs{display:flex;gap:5px}
.dt{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);transition:background .1s,color .1s,border-color .1s;white-space:nowrap}
.dt:hover{background:var(--color-background-secondary)}

.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.sfield{display:flex;flex-direction:column;gap:5px}
.sfield label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-secondary)}
.pace-wrap{display:flex;align-items:center;gap:5px}
.pace-wrap input{width:50px;font-size:15px;font-weight:500;text-align:center;padding:7px 4px;border-radius:var(--border-radius-md)}
.psep{font-size:15px;color:var(--color-text-secondary);line-height:1}
input[type="date"]{width:100%;font-size:14px;padding:8px 10px;border-radius:var(--border-radius-md)}

.accordion{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:.75rem;overflow:hidden}
.acc-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;cursor:pointer;background:transparent;border:none;text-align:left;gap:12px}
.acc-trigger:hover{background:var(--color-background-secondary)}
.acc-left{display:flex;align-items:center;gap:10px}
.acc-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.acc-meta{font-size:12px;color:var(--color-text-secondary)}
.acc-chevron{font-size:16px;color:var(--color-text-secondary);transition:transform .2s;flex-shrink:0}
.acc-chevron.open{transform:rotate(180deg)}
.acc-body{padding:0 1.5rem 1.25rem;display:none}
.acc-body.open{display:block}

.rec-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.rs{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.rs-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.rs-val{font-size:17px;font-weight:500}
.rs-sub{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.rec-sessions-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-secondary);margin-bottom:6px}
.rec-sessions{display:flex;flex-direction:column;gap:4px}
.sess-rec{display:grid;grid-template-columns:8px 1fr auto auto;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--border-radius-md);background:var(--color-background-secondary)}
.sess-dot{width:8px;height:8px;border-radius:50%}
.sess-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.sess-detail{font-size:12px;color:var(--color-text-secondary)}
.sess-freq{font-size:12px;color:var(--color-text-secondary);white-space:nowrap;text-align:right}

.section-divider{height:0.5px;background:var(--color-border-tertiary);margin:1.25rem 0}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:9px 5px;display:flex;flex-direction:column;gap:5px;background:var(--color-background-primary);transition:border-color .12s}
.dc-name{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;text-align:center}
.dc-type-btn{width:100%;padding:6px 2px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:transparent;cursor:pointer;font-size:11px;color:var(--color-text-secondary);text-align:center;transition:all .12s;line-height:1.2}
.dc-type-btn.active-run{background:#FAECE7;border-color:#D85A30;color:#712B13;font-weight:500}
.dc-type-btn.active-bike{background:#E6F1FB;border-color:#378ADD;color:#0C447C;font-weight:500}
.dc-type-btn.active-rest{background:var(--color-background-secondary);border-color:var(--color-border-tertiary);color:var(--color-text-tertiary)}
.sess-select{width:100%;font-size:10px;padding:3px 4px;border-radius:5px}

.plan-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.plan-heading{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.print-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:12px;font-weight:500;color:var(--color-text-primary);transition:all .12s}
.print-btn:hover{background:var(--color-background-secondary)}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:1rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.stat-val{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.stat-sub{font-size:10px;color:var(--color-text-secondary);margin-top:1px}

.plan-rows{display:flex;flex-direction:column;gap:6px}
.plan-card{border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden}
.plan-card.run-card{border-left:3px solid #D85A30;border-radius:var(--border-radius-lg)}
.plan-card.bike-card{border-left:3px solid #378ADD;border-radius:var(--border-radius-lg)}
.plan-card.rest-card{background:var(--color-background-secondary);border-style:dashed;border-left-style:dashed}
.pc-head{display:grid;grid-template-columns:88px 1fr auto;align-items:start;gap:12px;padding:11px 14px}
.pc-day{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;padding-top:1px}
.pc-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.pc-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;line-height:1.4}
.pc-right{text-align:right;min-width:80px}
.pc-pace-range{font-size:13px;font-weight:500}
.pc-km{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.steps{border-top:0.5px solid var(--color-border-tertiary);margin:0 14px 11px;display:flex;flex-direction:column}
.step{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.step:last-child{border-bottom:none}
.step-left{display:flex;align-items:center;gap:8px}
.step-label{font-size:12px;color:var(--color-text-secondary)}
.step-rep{font-size:11px;color:var(--color-text-tertiary)}
.step.key .step-label{color:var(--color-text-primary);font-weight:500}
.step-pace{font-size:12px;font-weight:500;text-align:right;white-space:nowrap}
.pace-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid transparent}

.warn{font-size:12px;color:var(--color-text-warning);padding:7px 12px;background:var(--color-background-warning);border-radius:var(--border-radius-md);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.finish-note{font-size:12px;color:var(--color-text-secondary);line-height:1.6;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-top:8px}
.finish-note strong{color:var(--color-text-primary);font-weight:500}

@media print {
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .no-print{display:none!important}
  .page{background:#fff!important;padding:0!important;min-height:unset}
  .container{max-width:100%!important;padding:20px 28px!important}
  .plan-header-row{margin-bottom:12px}
  .plan-heading{font-size:16px}
  .stat-row{gap:6px;margin-bottom:12px}
  .stat{background:#f6f6f4!important;padding:9px 11px}
  .stat-val{font-size:15px}
  .plan-card{page-break-inside:avoid;margin-bottom:5px!important;border:1px solid #e0e0e0!important}
  .plan-card.run-card{border-left:3px solid #D85A30!important}
  .plan-card.bike-card{border-left:3px solid #378ADD!important}
  .plan-card.rest-card{background:#f9f9f9!important;border:1px dashed #ccc!important}
  .steps{margin:0 12px 10px}
  .pace-pill{border:1px solid #ddd!important}
  .finish-note{background:#f6f6f4!important;margin-top:10px}
  body{font-family:system-ui,sans-serif;font-size:11px}
  @page{margin:1.5cm;size:A4}
}
</style>

<div class="page">
<div class="container">
<h2 class="sr-only">Ugeplanlægger med PDF-export</h2>

<div class="page-header no-print">
  <div class="page-title">Ugeplanlægger</div>
  <div class="page-sub">Sæt dit mål, byg din uge</div>
</div>

<div class="card no-print">
  <span class="card-label">Måldistance</span>
  <div class="dist-tabs" id="distTabs">
    <button class="dt" data-d="5k"  onclick="setDist(this)">5 km</button>
    <button class="dt" data-d="10k" onclick="setDist(this)">10 km</button>
    <button class="dt on" data-d="hm" onclick="setDist(this)">Halvmarathon</button>
    <button class="dt" data-d="m"   onclick="setDist(this)">Marathon</button>
  </div>
</div>

<div class="card no-print settings-row">
  <div class="sfield">
    <label>Goalpace</label>
    <div class="pace-wrap">
      <input type="number" id="pMin" min="2" max="10" value="5" aria-label="Min">
      <span class="psep">:</span>
      <input type="number" id="pSec" min="0" max="59" value="30" aria-label="Sek">
      <span style="font-size:12px;color:var(--color-text-secondary);margin-left:5px">min/km</span>
    </div>
  </div>
  <div class="sfield">
    <label>Racedag</label>
    <input type="date" id="raceDate">
  </div>
</div>

<div class="accordion no-print" id="recAccordion">
  <button class="acc-trigger" onclick="toggleAcc()" aria-expanded="false" aria-controls="accBody">
    <div class="acc-left">
      <i class="ti ti-chart-bar" aria-hidden="true" style="font-size:16px;color:var(--color-text-secondary)"></i>
      <span class="acc-title">Anbefalinger for dit mål</span>
      <span class="acc-meta" id="accMeta"></span>
    </div>
    <i class="ti ti-chevron-down acc-chevron" id="accChevron" aria-hidden="true"></i>
  </button>
  <div class="acc-body" id="accBody">
    <div class="rec-stats" id="recStats"></div>
    <div class="rec-sessions-lbl">Anbefalet fordeling</div>
    <div class="rec-sessions" id="recSessions"></div>
  </div>
</div>

<div class="card no-print" style="padding:1rem 1.5rem">
  <span class="card-label" style="margin-bottom:.65rem">Ugens dage</span>
  <div class="week-grid" id="weekGrid"></div>
</div>

<div class="section-divider no-print"></div>

<div class="plan-header-row">
  <div class="plan-heading" id="planHeading">Din uge</div>
  <button class="print-btn no-print" onclick="window.print()">
    <i class="ti ti-printer" aria-hidden="true" style="font-size:15px"></i>
    Udskriv / PDF
  </button>
</div>

<div class="stat-row" id="statRow"></div>
<div id="warnBox" class="no-print"></div>
<div class="plan-rows" id="planRows"></div>
<div class="finish-note" id="finishNote"></div>

</div>
</div>

<script>
const DAYS_SHORT=['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const DAYS_FULL=['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
const DISTS={
  '5k': {label:'5 km',        km:5,       color:'#534AB7',cf:0.92},
  '10k':{label:'10 km',       km:10,      color:'#1D9E75',cf:0.95},
  'hm': {label:'Halvmarathon',km:21.0975, color:'#E85D26',cf:1.00},
  'm':  {label:'Marathon',    km:42.195,  color:'#185FA5',cf:1.08},
};
const SESSION_TYPES=[
  {id:'easy',    label:'Rolig løbetur'},
  {id:'long',    label:'Langtur'},
  {id:'tempo',   label:'Tempoløb'},
  {id:'int',     label:'Intervalløb'},
  {id:'vo2',     label:'VO2max-drag'},
  {id:'race',    label:'Race-pace-løb'},
  {id:'rest_run',label:'Restitutionsløb'},
];
const REC_SESSIONS={
  '5k': [{name:'Langtur',detail:'8–12 km, zone 2',freq:'1× /uge',color:'#1D9E75'},{name:'Intervalløb',detail:'6–8× 400 m',freq:'1× /uge',color:'#D85A30'},{name:'Tempoløb',detail:'20–25 min',freq:'1× /uge',color:'#BA7517'},{name:'Rolig løbetur',detail:'Zone 2, 6–8 km',freq:'1–2× /uge',color:'#888780'}],
  '10k':[{name:'Langtur',detail:'12–16 km, zone 2',freq:'1× /uge',color:'#1D9E75'},{name:'Intervalløb',detail:'5–6× 1 km',freq:'1× /uge',color:'#D85A30'},{name:'Tempoløb',detail:'25–30 min',freq:'1× /uge',color:'#BA7517'},{name:'Rolig løbetur',detail:'Zone 2, 8–10 km',freq:'1–2× /uge',color:'#888780'}],
  'hm': [{name:'Langtur',detail:'16–22 km, zone 2',freq:'1× /uge',color:'#1D9E75'},{name:'Race-pace-løb',detail:'6–10 km i goalpace',freq:'1× /uge',color:'#E85D26'},{name:'Tempoløb',detail:'30 min',freq:'1× /uge',color:'#BA7517'},{name:'Rolig løbetur',detail:'Zone 2, 8–12 km',freq:'1–2× /uge',color:'#888780'}],
  'm':  [{name:'Langtur',detail:'24–35 km, zone 2',freq:'1× /uge',color:'#1D9E75'},{name:'Maratonpace-løb',detail:'12–18 km i goalpace',freq:'1× /uge',color:'#185FA5'},{name:'Tempoløb',detail:'35–40 min',freq:'1× /uge',color:'#BA7517'},{name:'Rolig løbetur',detail:'Zone 2, 10–14 km',freq:'2× /uge',color:'#888780'}],
};
const DIST_REQS={
  '5k': p=>({sessions:p<240?4:3,peakKm:p<240?50:p<270?42:35,duration:p<240?'45–60 min':'30–50 min'}),
  '10k':p=>({sessions:4,peakKm:p<270?60:p<315?50:42,duration:p<270?'50–70 min':'40–60 min'}),
  'hm': p=>({sessions:p<300?5:4,peakKm:p<300?75:p<360?62:55,duration:p<300?'60–90 min':'50–75 min'}),
  'm':  p=>({sessions:5,peakKm:p<330?90:p<390?75:65,duration:p<330?'60–120 min':'55–100 min'}),
};

let curDist='hm';
let dayTypes=['rest','run','rest','run','rest','run','rest'];
let daySessions=['','tempo','','long','','race',''];

function pad(n){return String(Math.round(n)).padStart(2,'0')}
function s2p(s){const m=Math.floor(s/60),sc=Math.round(s%60);return m+':'+pad(sc)}
function fmtHMS(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.round(s%60);return(h?h+'t ':'')+pad(m)+':'+pad(sc)}
function weeksOut(){
  const v=document.getElementById('raceDate').value;
  if(!v)return 15;
  return Math.max(1,Math.round((new Date(v)-new Date())/(1000*60*60*24*7)));
}
function getRefs(){
  const mins=parseInt(document.getElementById('pMin').value)||5;
  const secs=Math.max(0,Math.min(59,parseInt(document.getElementById('pSec').value)||0));
  const raw=mins*60+secs;
  return{raw,hmRef:raw/DISTS[curDist].cf};
}
function toggleAcc(){
  const body=document.getElementById('accBody');
  const chevron=document.getElementById('accChevron');
  const trigger=document.querySelector('.acc-trigger');
  const open=body.classList.toggle('open');
  chevron.classList.toggle('open',open);
  trigger.setAttribute('aria-expanded',open);
}
function setDist(btn){
  document.querySelectorAll('.dt').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.borderColor='';b.style.color=''});
  btn.classList.add('on');curDist=btn.dataset.d;
  const c=DISTS[curDist].color;
  btn.style.background=c;btn.style.borderColor='transparent';btn.style.color='#fff';
  renderGrid();render();
}
function cycleType(i){
  const order=['rest','run','bike'];
  dayTypes[i]=order[(order.indexOf(dayTypes[i])+1)%order.length];
  if(dayTypes[i]==='run'&&!daySessions[i])daySessions[i]=autoSession(i);
  if(dayTypes[i]!=='run')daySessions[i]='';
  renderGrid();render();
}
function autoSession(i){
  const run=dayTypes.map((t,j)=>t==='run'?j:-1).filter(j=>j>=0).sort((a,b)=>a-b);
  const pos=run.indexOf(i),n=run.length;
  if(pos===n-1)return'long';
  if(n<=2)return pos===0?'tempo':'long';
  return pos===0?'tempo':'easy';
}
function renderGrid(){
  document.getElementById('weekGrid').innerHTML=DAYS_SHORT.map((d,i)=>{
    const t=dayTypes[i];
    const labels={rest:'Hvile',run:'Løb',bike:'Cykling'};
    const cls={rest:'active-rest',run:'active-run',bike:'active-bike'}[t];
    let sel='';
    if(t==='run'){
      sel=`<select class="sess-select" onchange="daySessions[${i}]=this.value;render()">${SESSION_TYPES.map(s=>`<option value="${s.id}"${daySessions[i]===s.id?' selected':''}>${s.label}</option>`).join('')}</select>`;
    }
    return `<div class="day-card"><div class="dc-name">${d}</div><button class="dc-type-btn ${cls}" onclick="cycleType(${i})">${labels[t]}</button>${sel}</div>`;
  }).join('');
}
function pill(lo,hi,color,key){
  const bg=key?color+'1a':'var(--color-background-secondary)';
  const tc=key?color:'var(--color-text-primary)';
  const bc=key?color+'55':'var(--color-border-tertiary)';
  return `<span class="pace-pill" style="background:${bg};color:${tc};border-color:${bc}">${s2p(lo)} – ${s2p(hi)}</span>`;
}
function buildSession(sessId,hmRef,weekKm,phase){
  const r=(a,b)=>({lo:Math.round(hmRef*a),hi:Math.round(hmRef*b)});
  const easy=r(1.18,1.32),longg=r(1.15,1.30),tempo=r(0.92,0.99);
  const intr=r(0.86,0.94),vo2=r(0.79,0.88),race=r(0.97,1.04);
  const rest=r(1.30,1.45),warm=r(1.22,1.32),cool=r(1.25,1.35);
  const rep={base:'5',build:'6',peak:'4'}[phase];
  const tmin={base:'20',build:'30',peak:'20'}[phase];
  const rbk={base:'5',build:'8',peak:'6'}[phase];
  const d={
    easy:{title:'Rolig løbetur',sub:'Let og kontrolleret. Puls lav, samtalevenlig.',dr:easy,km:Math.max(6,Math.round(weekKm*.18)),steps:[{l:'Hele løbet',r:'',range:easy,key:true}]},
    long:{title:'Langtur',sub:phase==='peak'?'Reduceret i taperfasen.':'Grundstensløbet — byg aerob kapacitet.',dr:longg,km:Math.max(12,Math.round(weekKm*(phase==='peak'?.22:.30))),steps:[{l:'Første halvdel',r:'',range:r(1.22,1.32),key:false},{l:'Anden halvdel',r:'',range:r(1.15,1.25),key:true},...(phase==='build'?[{l:'Afsluttende 2–3 km',r:'',range:r(1.05,1.12),key:true}]:[]),]},
    tempo:{title:'Tempoløb',sub:'Ubehageligt men holdbart. Bygger laktatgrænsen.',dr:tempo,km:Math.max(8,Math.round(weekKm*.18)),steps:[{l:'Opvarmning',r:'15 min',range:warm,key:false},{l:'Tempoblok',r:tmin+' min',range:tempo,key:true},{l:'Nedvarmning',r:'10 min',range:cool,key:false}]},
    int:{title:'Intervalløb',sub:'Gentagelser med fuld restitution. Øger VO2max.',dr:intr,km:Math.max(8,Math.round(weekKm*.16)),steps:[{l:'Opvarmning',r:'2 km',range:warm,key:false},{l:'Intervaller',r:rep+' × 1 km',range:intr,key:true},{l:'Restitution ml. rep',r:'400 m',range:rest,key:false},{l:'Nedvarmning',r:'1 km',range:cool,key:false}]},
    vo2:{title:'VO2max-drag',sub:'Korte, meget hårde drag. Kræver fuld restitution.',dr:vo2,km:Math.max(6,Math.round(weekKm*.14)),steps:[{l:'Opvarmning',r:'2 km',range:warm,key:false},{l:'Drag',r:(phase==='build'?'8':'6')+' × 400 m',range:vo2,key:true},{l:'Restitution ml. drag',r:'400 m',range:rest,key:false},{l:'Nedvarmning',r:'1 km',range:cool,key:false}]},
    race:{title:'Race-pace-løb',sub:'Mærk goalpace. Kontrolleret — ikke fuld indsats.',dr:race,km:Math.max(7,Math.round(weekKm*.17)),steps:[{l:'Opvarmning',r:'2 km',range:warm,key:false},{l:'Race-pace-blok',r:rbk+' km',range:race,key:true},{l:'Nedvarmning',r:'1 km',range:cool,key:false}]},
    rest_run:{title:'Restitutionsløb',sub:'Meget let. Benene i gang uden belastning.',dr:rest,km:Math.max(4,Math.round(weekKm*.11)),steps:[{l:'Hele løbet',r:'30–40 min',range:rest,key:true}]},
  };
  return d[sessId]||d['easy'];
}

function render(){
  const color=DISTS[curDist].color;
  document.querySelectorAll('.dt').forEach(b=>{
    if(b.dataset.d===curDist){b.style.background=color;b.style.borderColor='transparent';b.style.color='#fff'}
    else{b.style.background='';b.style.borderColor='';b.style.color=''}
  });
  const{raw,hmRef}=getRefs();
  const weeks=weeksOut();
  const d=DISTS[curDist];
  const phase=weeks>12?'base':weeks>5?'build':'peak';
  const phaseLabel={base:'Opbygning',build:'Specifik',peak:'Taper'}[phase];
  const runIdxs=dayTypes.map((t,i)=>t==='run'?i:-1).filter(i=>i>=0);
  const bikeIdxs=dayTypes.map((t,i)=>t==='bike'?i:-1).filter(i=>i>=0);
  const req=DIST_REQS[curDist](raw);
  const peakKm=req.peakKm;
  const weekKm=Math.round(peakKm*(phase==='base'?.62:phase==='build'?.82:.48));

  document.getElementById('accMeta').textContent=d.label+' · '+fmtHMS(raw*d.km);
  document.getElementById('recStats').innerHTML=[
    {lbl:'Træninger/uge',val:req.sessions+'+',sub:'løbepas'},
    {lbl:'Peak volumen',val:peakKm+' km',sub:'pr. uge'},
    {lbl:'Træningstid/pas',val:req.duration,sub:'typisk'},
  ].map(s=>`<div class="rs"><div class="rs-lbl">${s.lbl}</div><div class="rs-val" style="color:${color}">${s.val}</div><div class="rs-sub">${s.sub}</div></div>`).join('');
  document.getElementById('recSessions').innerHTML=REC_SESSIONS[curDist].map(s=>
    `<div class="sess-rec"><div class="sess-dot" style="background:${s.color}"></div><span class="sess-name">${s.name}</span><span class="sess-detail">${s.detail}</span><span class="sess-freq">${s.freq}</span></div>`
  ).join('');

  const now=new Date();
  document.getElementById('planHeading').textContent='Uge '+getWeekNum(now)+' · '+now.toLocaleDateString('da-DK',{day:'numeric',month:'long'});

  document.getElementById('statRow').innerHTML=[
    {lbl:'Fase',val:phaseLabel,sub:weeks+' uger til race'},
    {lbl:'Løbedage',val:runIdxs.length,sub:bikeIdxs.length?bikeIdxs.length+' cykling':''},
    {lbl:'Km denne uge',val:weekKm+' km',sub:'anbefalet'},
    {lbl:'Peak km',val:peakKm+' km',sub:'pr. uge'},
  ].map(s=>`<div class="stat"><div class="stat-lbl">${s.lbl}</div><div class="stat-val">${s.val}</div><div class="stat-sub">${s.sub||'&nbsp;'}</div></div>`).join('');

  const warns=[];
  const hard=['int','vo2','tempo','race'];
  [...runIdxs].sort((a,b)=>a-b).forEach((di,idx,arr)=>{
    if(idx>0&&arr[idx-1]===di-1&&hard.includes(daySessions[arr[idx-1]])&&hard.includes(daySessions[di]))
      warns.push(`${DAYS_FULL[arr[idx-1]]} og ${DAYS_FULL[di]} er begge hårde pas — overvej hviledag imellem.`);
  });
  if(runIdxs.filter(i=>daySessions[i]==='long').length>1)warns.push('Mere end én langtur — vælg den vigtigste.');
  if(runIdxs.length>=2&&!runIdxs.some(i=>daySessions[i]==='long'))warns.push('Ingen langtur planlagt — vigtigt fundament for udholdenhed.');
  document.getElementById('warnBox').innerHTML=warns.map(w=>`<div class="warn"><i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:13px"></i>${w}</div>`).join('');

  document.getElementById('planRows').innerHTML=DAYS_FULL.map((dayName,i)=>{
    const t=dayTypes[i];
    if(t==='rest')return`<div class="plan-card rest-card"><div class="pc-head"><span class="pc-day">${dayName}</span><span style="font-size:12px;color:var(--color-text-secondary)">Hvile</span><span></span></div></div>`;
    if(t==='bike')return`<div class="plan-card bike-card"><div class="pc-head"><span class="pc-day">${dayName}</span><span style="font-size:12px;color:var(--color-text-secondary);font-style:italic">Cykling — eget valg</span><span></span></div></div>`;
    const sessId=daySessions[i]||'easy';
    const sess=buildSession(sessId,hmRef,weekKm,phase);
    const stepsHtml=sess.steps.length>1?`<div class="steps">${sess.steps.map(s=>`<div class="step${s.key?' key':''}">
      <div class="step-left"><span class="step-label">${s.l}</span>${s.r?`<span class="step-rep">· ${s.r}</span>`:''}</div>
      <span class="step-pace">${pill(s.range.lo,s.range.hi,color,s.key)}</span>
    </div>`).join('')}</div>`:'';
    return`<div class="plan-card run-card"><div class="pc-head">
      <span class="pc-day">${dayName}</span>
      <div><div class="pc-title">${sess.title}</div><div class="pc-sub">${sess.sub}</div></div>
      <div class="pc-right"><div class="pc-pace-range" style="color:${color}">${s2p(sess.dr.lo)}–${s2p(sess.dr.hi)}</div><div class="pc-km">~${sess.km} km</div></div>
    </div>${stepsHtml}</div>`;
  }).join('');

  document.getElementById('finishNote').innerHTML=`Sluttid: <strong>${fmtHMS(raw*d.km)}</strong> &nbsp;·&nbsp; Paces fra HM-ref <strong>${s2p(hmRef)} min/km</strong>`;
}

function getWeekNum(d){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

function setDefaultDate(){
  const dt=new Date();dt.setDate(dt.getDate()+102);
  document.getElementById('raceDate').value=dt.toISOString().slice(0,10);
}
document.getElementById('pMin').addEventListener('input',render);
document.getElementById('pSec').addEventListener('input',()=>{const e=document.getElementById('pSec');if(+e.value>59)e.value=59;if(+e.value<0)e.value=0;render()});
document.getElementById('raceDate').addEventListener('input',render);
setDefaultDate();renderGrid();render();
</script>
